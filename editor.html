<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Toolbar */
    .toolbar {
      background: #2d2d2d;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid #3d3d3d;
      flex-shrink: 0;
    }

    .toolbar-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-separator {
      width: 1px;
      height: 24px;
      background: #4d4d4d;
    }

    .tool-btn {
      background: #3d3d3d;
      border: 2px solid transparent;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .tool-btn:hover {
      background: #4d4d4d;
    }

    .tool-btn.active {
      background: #0078d4;
      border-color: #0078d4;
    }

    .tool-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .color-input {
      width: 36px;
      height: 36px;
      border: 2px solid #4d4d4d;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
    }

    .size-slider {
      width: 80px;
    }

    .size-label {
      font-size: 12px;
      color: #999;
      min-width: 40px;
    }

    .action-btn {
      background: #0078d4;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .action-btn:hover {
      background: #106ebe;
    }

    .action-btn.secondary {
      background: #3d3d3d;
    }

    .action-btn.secondary:hover {
      background: #4d4d4d;
    }

    /* Canvas Container */
    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 20px;
      background: #1e1e1e;
    }

    #editorCanvas {
      border: 1px solid #3d3d3d;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      cursor: crosshair;
      background: white;
    }

    .spacer {
      flex: 1;
    }

    .tool-group {
      display: flex;
      gap: 4px;
    }

    /* Instructions */
    .instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-section tool-group">
      <button class="tool-btn active" id="selectTool" data-tool="select">
        <svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
        Select
      </button>
      <button class="tool-btn" id="arrowTool" data-tool="arrow">
        <svg viewBox="0 0 24 24"><path d="M16.01 11H4v2h12.01v3L20 12l-3.99-4z"/></svg>
        Arrow
      </button>
      <button class="tool-btn" id="rectTool" data-tool="rect">
        <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        Rectangle
      </button>
      <button class="tool-btn" id="highlightTool" data-tool="highlight">
        <svg viewBox="0 0 24 24"><path d="M17.75 7L14 3.25l-10 10V17h3.75l10-10zm2.96-2.96a.996.996 0 000-1.41L18.37.29a.996.996 0 00-1.41 0L15 2.25 18.75 6l1.96-1.96z"/></svg>
        Highlight
      </button>
      <button class="tool-btn" id="blurTool" data-tool="blur">
        <svg viewBox="0 0 24 24"><path d="M6 13c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-8c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm-3 .5c-.28 0-.5.22-.5.5s.22.5.5.5.5-.22.5-.5-.22-.5-.5-.5zM6 5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm15 5.5c.28 0 .5-.22.5-.5s-.22-.5-.5-.5-.5.22-.5.5.22.5.5.5zM14 7c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm0-3.5c.28 0 .5-.22.5-.5s-.22-.5-.5-.5-.5.22-.5.5.22.5.5.5zm-11 10c-.28 0-.5.22-.5.5s.22.5.5.5.5-.22.5-.5-.22-.5-.5-.5zm7 7c-.28 0-.5.22-.5.5s.22.5.5.5.5-.22.5-.5-.22-.5-.5-.5zm0-17c.28 0 .5-.22.5-.5s-.22-.5-.5-.5-.5.22-.5.5.22.5.5.5zM10 7c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm0 5.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm8 .5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-8c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm3 8.5c-.28 0-.5.22-.5.5s.22.5.5.5.5-.22.5-.5-.22-.5-.5-.5zM14 17c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0 3.5c-.28 0-.5.22-.5.5s.22.5.5.5.5-.22.5-.5-.22-.5-.5-.5zm-4-12c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0 8.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm4 0c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        Blur
      </button>
      <button class="tool-btn" id="textTool" data-tool="text">
        <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4H5z"/></svg>
        Text
      </button>
    </div>

    <div class="toolbar-separator"></div>

    <div class="toolbar-section">
      <span class="size-label">Color:</span>
      <input type="color" id="colorPicker" class="color-input" value="#ff0000">
    </div>

    <div class="toolbar-section">
      <span class="size-label">Size:</span>
      <input type="range" id="sizeSlider" class="size-slider" min="1" max="20" value="3">
      <span class="size-label" id="sizeValue">3px</span>
    </div>

    <div class="toolbar-separator"></div>

    <div class="toolbar-section">
      <button class="tool-btn" id="undoBtn">
        <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
        Undo
      </button>
      <button class="tool-btn" id="clearBtn">Clear All</button>
    </div>

    <div class="spacer"></div>

    <div class="toolbar-section">
      <button class="action-btn secondary" id="cancelBtn">Cancel</button>
      <button class="action-btn" id="saveBtn">Save & Download</button>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="editorCanvas"></canvas>
  </div>

  <div class="instructions">
    <strong>Tips:</strong> Draw on the canvas | Use undo to remove last action | Click Save to download edited image
  </div>

  <script src="editor.js"></script>
</body>
</html>
